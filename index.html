<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>สมุดคำศัพท์</title>
<meta name="theme-color" content="#312e81" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="คำศัพท์" />
<style>
  :root{
    --bg:#fafaf7;--card:#fff;--ink:#0f172a;--muted:#64748b;--muted2:#94a3b8;
    --border:#e2e8f0;--indigo:#4f46e5;--indigo-d:#312e81;--indigo-l:#eef2ff;
    --amber:#f59e0b;--amber-bg:#fffbeb;--amber-bd:#fde68a;--amber-tx:#b45309;
    --emerald:#10b981;--emerald-bg:#ecfdf5;--emerald-bd:#a7f3d0;--emerald-tx:#047857;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:#334155;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent;line-height:1.4}
  .serif{font-family:Georgia,"Times New Roman",serif}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom))}
  header{padding:calc(26px + env(safe-area-inset-top)) 0 16px}
  .h-row{display:flex;align-items:baseline;justify-content:space-between}
  h1{font-family:Georgia,serif;font-size:24px;font-weight:700;letter-spacing:-.01em;color:var(--indigo-d);margin:0}
  .sub{color:var(--muted);font-size:14px;margin:4px 0 0}
  .count{color:var(--muted2);font-size:14px}

  .tabs{display:flex;gap:4px;background:#fff;padding:4px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);border:1px solid var(--border);margin-bottom:20px}
  .tab{flex:1;border:0;background:transparent;border-radius:8px;padding:9px 2px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
  .tab.active{background:var(--indigo);color:#fff}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid-pos{display:grid;grid-template-columns:160px 1fr;gap:8px;margin-top:8px}
  @media(max-width:520px){.grid2,.grid-pos{grid-template-columns:1fr}}
  input,select{width:100%;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;background:#fff}
  input:focus,select:focus{border-color:#a5b4fc;box-shadow:0 0 0 3px var(--indigo-l)}
  input.serif{font-family:Georgia,serif}
  .btn{width:100%;border:0;border-radius:9px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-primary{background:var(--indigo);color:#fff;margin-top:12px}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--muted);font-weight:600;margin-top:20px}

  .search{margin:18px 0 12px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{border:1px solid var(--border);background:#fff;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
  .chip.on{border-color:var(--indigo);background:var(--indigo);color:#fff}
  .chip .n{opacity:.7;margin-left:2px}

  .list{display:flex;flex-direction:column;gap:12px}
  .word{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .word .en{font-family:Georgia,serif;font-size:18px;font-weight:600;color:var(--ink)}
  .word .pos{font-size:12px;font-style:italic;color:var(--muted2);margin-left:6px}
  .word .mean{font-size:14px;color:#475569;margin-top:2px}
  .ex{margin-top:8px;border-left:2px solid #c7d2fe;padding-left:12px;font-size:14px;font-style:italic;color:var(--muted)}
  .status{flex:none;border-radius:999px;border:1px solid;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .dot{width:6px;height:6px;border-radius:999px;display:inline-block}
  .st-new{background:#f1f5f9;color:#475569;border-color:#e2e8f0}.st-new .dot{background:#94a3b8}
  .st-learning{background:var(--amber-bg);color:var(--amber-tx);border-color:var(--amber-bd)}.st-learning .dot{background:var(--amber)}
  .st-mastered{background:var(--emerald-bg);color:var(--emerald-tx);border-color:var(--emerald-bd)}.st-mastered .dot{background:var(--emerald)}
  .row-actions{display:flex;justify-content:flex-end;margin-top:10px;gap:10px;font-size:12px}
  .del{background:none;border:0;color:var(--muted2);cursor:pointer;font-family:inherit;font-size:12px}
  .del:hover{color:#ef4444}
  .del-red{color:#dc2626;font-weight:600;background:none;border:0;cursor:pointer;font-family:inherit}
  .empty{border:1px dashed #cbd5e1;border-radius:14px;background:#fff;padding:48px 16px;text-align:center;color:var(--muted);font-size:14px}

  /* review */
  .rev-top{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:12px}
  .flash{min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#fff;border:1px solid var(--border);border-radius:18px;padding:32px;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;user-select:none}
  .flash:active{transform:scale(.99)}
  .flash .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#cbd5e1;margin-bottom:8px}
  .flash .lbl.m{color:#a5b4fc}
  .flash .big{font-family:Georgia,serif;font-size:38px;font-weight:700;color:var(--ink);margin:0}
  .flash .mean-big{font-size:24px;font-weight:600;color:var(--ink);margin:0}
  .flash .hint{margin-top:24px;font-size:12px;color:var(--muted2)}
  .rev-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .btn-forgot{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber-tx)}
  .btn-known{background:var(--emerald);border:0;color:#fff}
  .rev-note{text-align:center;font-size:12px;color:var(--muted2);margin-top:12px}
  .done{border:1px solid var(--emerald-bd);background:var(--emerald-bg);border-radius:18px;padding:48px 16px;text-align:center}
  .done h2{color:var(--emerald-tx);margin:0 0 4px}.done p{color:#059669;margin:0;font-size:14px}

  /* stats */
  .stat-hero{text-align:center;padding:24px}
  .stat-hero .big{font-family:Georgia,serif;font-size:48px;font-weight:700;color:var(--indigo-d);margin:4px 0 0}
  .stat-hero .sub2{color:var(--emerald-tx);font-size:14px;margin-top:4px}
  .bar-row{margin-bottom:16px}
  .bar-row:last-child{margin-bottom:0}
  .bar-top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
  .bar-top .l{display:flex;align-items:center;gap:8px;color:#475569}
  .bar{height:8px;background:#f1f5f9;border-radius:999px;overflow:hidden}
  .bar > span{display:block;height:100%;border-radius:999px}

  .foot{text-align:center;margin-top:28px;font-size:12px;color:var(--muted2)}
  .foot a{color:var(--indigo);cursor:pointer;text-decoration:none}
  .player{background:#fff;border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .pl-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#cbd5e1}
  .pl-word{font-family:Georgia,serif;font-size:40px;font-weight:700;color:var(--ink);margin:6px 0 2px;word-break:break-word;line-height:1.15}
  .pl-pos{font-size:13px;font-style:italic;color:var(--muted2);min-height:18px}
  .pl-mean{font-size:18px;color:#475569;margin-top:6px;min-height:24px}
  .pl-controls{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:24px}
  .pl-side{width:56px;height:56px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:22px;color:var(--indigo-d);cursor:pointer}
  .pl-main{width:78px;height:78px;border-radius:999px;border:0;background:var(--indigo);color:#fff;font-size:30px;cursor:pointer;box-shadow:0 4px 14px rgba(79,70,229,.35)}
  .pl-main:active,.pl-side:active{transform:scale(.96)}
  .pl-set{margin-top:16px}
  .pl-row-label{font-size:13px;color:var(--muted);margin-bottom:6px}
  .pills{display:flex;flex-wrap:wrap;gap:8px}
  .pill{border:1px solid var(--border);background:#fff;border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
  .pill.on{border-color:var(--indigo);background:var(--indigo);color:#fff}
  .spk{border:1px solid var(--border);background:#fff;border-radius:999px;width:34px;height:34px;font-size:15px;cursor:pointer;flex:none;padding:0}
  .spk:active{transform:scale(.94)}
  .done-btn{border:1px solid var(--emerald-bd);background:var(--emerald-bg);color:var(--emerald-tx);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex:none}
  .done-btn:active{transform:scale(.95)}

  /* typing practice */
  .tp-mean{font-size:20px;font-weight:600;color:var(--ink);min-height:26px;margin-top:4px}
  .tp-word{font-family:Georgia,serif;font-size:34px;font-weight:700;margin-top:14px;line-height:1.3;letter-spacing:.02em;word-break:break-word;color:#cbd5e1}
  .tp-word span.ok{color:var(--ink)}
  .tp-word span.bad{color:#dc2626}
  .tp-word span.cur{box-shadow:inset 0 -3px 0 var(--indigo)}
  .tp-input{margin-top:18px;max-width:340px;text-align:center;font-family:Georgia,serif;font-size:17px}
  .tp-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--muted)}
  .tp-stats b{color:var(--ink)}

  /* bulk add */
  textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;background:#fff;resize:vertical;line-height:1.5}
  textarea:focus{border-color:#a5b4fc;box-shadow:0 0 0 3px var(--indigo-l)}
  .bulk-toggle{margin:10px 0 0;font-size:13px}
  .bulk-toggle a{color:var(--indigo);cursor:pointer}
  .bulk-hint{font-size:12px;color:var(--muted2);margin:8px 0 0}

  /* cloud sync */
  .sync{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--indigo-l);border:1px solid #c7d2fe;border-radius:12px;padding:8px 12px;font-size:13px;color:var(--indigo-d);margin-bottom:12px}
  .sync button{border:0;background:var(--indigo);color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex:none}
  .sync button.out{background:transparent;color:var(--muted);text-decoration:underline;padding:6px 4px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="h-row">
      <h1>สมุดคำศัพท์</h1>
      <span class="count" id="count">0 คำ</span>
    </div>
    <p class="sub">เก็บศัพท์ภาษาอังกฤษของคุณเอง พร้อมระบบทบทวน</p>
  </header>

  <div class="sync" id="syncBar" style="display:none"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-action="tab" data-v="list">คำศัพท์</button>
    <button class="tab" data-action="tab" data-v="review">ทบทวน</button>
    <button class="tab" data-action="tab" data-v="type">ฝึกพิมพ์</button>
    <button class="tab" data-action="tab" data-v="listen">ฟัง</button>
    <button class="tab" data-action="tab" data-v="stats">สถิติ</button>
  </div>

  <div id="root"></div>

  <p class="foot">
    เก็บข้อมูลในเครื่องนี้ · <a data-action="install">วิธีเพิ่มลงหน้าจอมือถือ</a>
  </p>
</div>

<script>
(function(){
  "use strict";
  var KEY = "vocab-words-v1";
  var STATUS = {
    "new":{label:"ใหม่",cls:"st-new",bar:"#94a3b8"},
    "learning":{label:"กำลังจำ",cls:"st-learning",bar:"#f59e0b"},
    "mastered":{label:"จำได้แล้ว",cls:"st-mastered",bar:"#10b981"}
  };
  var ORDER = ["new","learning","mastered"];

  var words = load();
  var view = "list";
  var filter = "all";
  var query = "";
  var revIdx = 0, revFlip = false;
  var confirmId = null;
  var bulkOpen = false, bulkMsg = "";
  var catFilter = "all", listLimit = 100, sortBy = "newest";
  var revCat = "all", tpCat = "all", lsCat = "all";

  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ return []; } }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(words)); }catch(e){} renderCount(); render(); }
  function uid(){ return (crypto && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }

  var root = document.getElementById("root");

  function renderCount(){ document.getElementById("count").textContent = words.length + " คำ"; }

  function counts(){
    var c = {all:words.length,new:0,learning:0,mastered:0};
    words.forEach(function(w){ c[w.status]=(c[w.status]||0)+1; });
    return c;
  }

  /* ---------- categories ---------- */
  function cats(){
    var s = {};
    words.forEach(function(w){ if(w.cat) s[w.cat]=1; });
    return Object.keys(s).sort();
  }
  function catMatch(w, f){ return f==="all" ? true : (f==="none" ? !w.cat : w.cat===f); }
  function catPills(cur, action){
    var cs = cats();
    if(!cs.length) return "";
    var html = '<button class="pill'+(cur==="all"?" on":"")+'" data-action="'+action+'" data-c="all">ทุกหมวด</button>';
    cs.forEach(function(c){ html += '<button class="pill'+(cur===c?" on":"")+'" data-action="'+action+'" data-c="'+esc(c)+'">'+esc(c)+'</button>'; });
    html += '<button class="pill'+(cur==="none"?" on":"")+'" data-action="'+action+'" data-c="none">ไม่มีหมวด</button>';
    return '<div class="pl-set"><div class="pl-row-label">หมวด</div><div class="pills">'+html+'</div></div>';
  }
  function catListHtml(){
    return '<datalist id="catList">'+cats().map(function(c){ return '<option value="'+esc(c)+'">'; }).join("")+'</datalist>';
  }

  function render(){
    if(view==="list") renderList();
    else if(view==="review") renderReview();
    else if(view==="type") renderType();
    else if(view==="listen") renderListen();
    else renderStats();
  }

  /* ---------- LIST ---------- */
  function renderList(){
    root.innerHTML =
      '<div class="card">'+
        '<div class="grid2">'+
          '<input id="w" class="serif" placeholder="คำศัพท์ภาษาอังกฤษ *" />'+
          '<input id="m" placeholder="ความหมาย (ภาษาไทย)" />'+
        '</div>'+
        '<div class="grid-pos">'+
          '<select id="pos">'+
            '<option value="n.">n. (คำนาม)</option>'+
            '<option value="v.">v. (คำกริยา)</option>'+
            '<option value="adj.">adj. (คำคุณศัพท์)</option>'+
            '<option value="adv.">adv. (กริยาวิเศษณ์)</option>'+
            '<option value="prep.">prep. (คำบุพบท)</option>'+
            '<option value="phrase">phrase (วลี/สำนวน)</option>'+
            '<option value="">อื่นๆ / ไม่ระบุ</option>'+
          '</select>'+
          '<input id="ex" placeholder="ประโยคตัวอย่าง (ไม่บังคับ)" />'+
        '</div>'+
        '<input id="cat" list="catList" placeholder="หมวด (ไม่บังคับ เช่น สำนวน, วลี, นิทาน)" style="margin-top:8px" />'+
        catListHtml()+
        '<button class="btn btn-primary" data-action="add">+ เพิ่มคำศัพท์</button>'+
      '</div>'+
      '<p class="bulk-toggle"><a data-action="bulk-toggle">'+(bulkOpen?"▾ ซ่อนการเพิ่มทีละหลายคำ":"▸ เพิ่มทีละหลายคำ (จากหนังสือ/รายการ)")+'</a></p>'+
      (bulkOpen ?
        '<div class="card" style="margin-top:8px">'+
          '<textarea id="bulk" rows="6" placeholder="บรรทัดละ 1 คำ เช่น&#10;apple = แอปเปิ้ล&#10;run = วิ่ง = v.&#10;give up = ยอมแพ้ = phrase"></textarea>'+
          '<input id="bulkCat" list="catList" placeholder="หมวดของชุดนี้ (ไม่บังคับ เช่น สำนวน)" style="margin-top:8px" />'+
          '<button class="btn btn-primary" data-action="bulk-add">+ เพิ่มทั้งหมด</button>'+
          (bulkMsg ? '<p class="bulk-hint" style="color:var(--emerald-tx);font-weight:600">'+esc(bulkMsg)+'</p>' : '')+
          '<p class="bulk-hint">รูปแบบ: คำศัพท์ = ความหมาย = ชนิดคำ (ชนิดคำไม่บังคับ) · ใช้ = หรือ , หรือ Tab คั่นก็ได้ · คำที่มีอยู่แล้วจะถูกข้ามให้อัตโนมัติ</p>'+
        '</div>' : '')+
      '<div class="search"><input id="search" placeholder="ค้นหาคำศัพท์หรือความหมาย…" value="'+esc(query)+'" /></div>'+
      '<div class="chips" id="chips"></div>'+
      '<div class="chips" id="catchips"></div>'+
      '<div class="chips" id="sortchips"></div>'+
      '<div id="list" class="list"></div>'+
      (words.length ? '<button class="btn btn-ghost" data-action="export">ส่งออก CSV</button>' : '');
    renderListArea();
  }

  function renderListArea(){
    var c = counts();
    var chipDefs = [["all","ทั้งหมด"],["new","ใหม่"],["learning","กำลังจำ"],["mastered","จำได้แล้ว"]];
    document.getElementById("chips").innerHTML = chipDefs.map(function(d){
      return '<button class="chip'+(filter===d[0]?" on":"")+'" data-action="filter" data-f="'+d[0]+'">'+d[1]+' <span class="n">'+(c[d[0]]||0)+'</span></button>';
    }).join("");

    var cs = cats();
    var cc = document.getElementById("catchips");
    if(cc){
      if(!cs.length){ cc.innerHTML = ""; }
      else {
        var h = '<button class="chip'+(catFilter==="all"?" on":"")+'" data-action="cat-filter" data-c="all">ทุกหมวด</button>';
        cs.forEach(function(cn){ h += '<button class="chip'+(catFilter===cn?" on":"")+'" data-action="cat-filter" data-c="'+esc(cn)+'">'+esc(cn)+'</button>'; });
        h += '<button class="chip'+(catFilter==="none"?" on":"")+'" data-action="cat-filter" data-c="none">ไม่มีหมวด</button>';
        cc.innerHTML = h;
      }
    }

    var sc = document.getElementById("sortchips");
    if(sc){
      var sortDefs = [["newest","ใหม่→เก่า"],["oldest","เก่า→ใหม่"],["az","A→Z"],["status","ยังไม่จำขึ้นก่อน"]];
      sc.innerHTML = '<span style="font-size:12px;color:var(--muted2);align-self:center">เรียง:</span>'+sortDefs.map(function(d){
        return '<button class="chip'+(sortBy===d[0]?" on":"")+'" data-action="sort" data-s="'+d[0]+'">'+d[1]+'</button>';
      }).join("");
    }

    var q = query.trim().toLowerCase();
    var rows = words
      .filter(function(w){ return filter==="all"?true:w.status===filter; })
      .filter(function(w){ return catMatch(w, catFilter); })
      .filter(function(w){ return !q ? true : (w.word.toLowerCase().indexOf(q)>=0 || (w.meaning||"").toLowerCase().indexOf(q)>=0); })
      .sort(function(a,b){
        if(sortBy==="oldest") return a.createdAt - b.createdAt;
        if(sortBy==="az") return a.word.toLowerCase().localeCompare(b.word.toLowerCase());
        if(sortBy==="status"){
          var d = ORDER.indexOf(a.status) - ORDER.indexOf(b.status);
          return d !== 0 ? d : b.createdAt - a.createdAt;
        }
        return b.createdAt - a.createdAt;
      });

    var list = document.getElementById("list");
    if(!rows.length){
      list.innerHTML = '<div class="empty">'+(words.length?"ไม่พบคำศัพท์ที่ตรงกับเงื่อนไข":"ยังไม่มีคำศัพท์ — เพิ่มคำแรกของคุณด้านบนได้เลย")+'</div>';
      return;
    }
    var more = rows.length > listLimit
      ? '<button class="btn btn-ghost" style="margin-top:0" data-action="more">แสดงอีก '+(rows.length-listLimit)+' คำ</button>'
      : '';
    list.innerHTML = rows.slice(0, listLimit).map(function(w){
      var s = STATUS[w.status]||STATUS["new"];
      var actions = (confirmId===w.id)
        ? '<span style="color:var(--muted)">ลบคำนี้?</span> <button class="del-red" data-action="del-yes" data-id="'+w.id+'">ลบ</button> <button class="del" data-action="del-no">ยกเลิก</button>'
        : '<button class="del" data-action="del-ask" data-id="'+w.id+'">ลบ</button>';
      return '<div class="card">'+
        '<div class="word">'+
          '<div style="min-width:0;flex:1">'+
            '<div><span class="en">'+esc(w.word)+'</span>'+(w.pos?'<span class="pos">'+esc(w.pos)+'</span>':'')+(w.cat?'<span class="pos">· '+esc(w.cat)+'</span>':'')+'</div>'+
            (w.meaning?'<div class="mean">'+esc(w.meaning)+'</div>':'')+
            (w.example?'<div class="ex">'+esc(w.example)+'</div>':'')+
          '</div>'+
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none">'+
            '<div style="display:flex;gap:6px;align-items:center">'+
              (w.status!=="mastered" ? '<button class="done-btn" data-action="quick-done" data-id="'+w.id+'" title="ติ๊กว่าจำได้แล้ว">✓ จำได้</button>' : '')+
              '<button class="status '+s.cls+'" data-action="cycle" data-id="'+w.id+'"><span class="dot"></span>'+s.label+'</button>'+
            '</div>'+
            '<button class="spk" data-action="speak" data-id="'+w.id+'" title="อ่านออกเสียง">🔊</button>'+
          '</div>'+
        '</div>'+
        '<div class="row-actions">'+actions+'</div>'+
      '</div>';
    }).join("") + more;
  }

  /* ---------- REVIEW ---------- */
  function deck(){ return words.filter(function(w){ return w.status!=="mastered" && catMatch(w, revCat); }); }

  function renderReview(){
    if(words.length===0){
      root.innerHTML = '<div class="empty">เพิ่มคำศัพท์ก่อน แล้วค่อยมาทบทวนนะครับ</div>'; return;
    }
    var d = deck();
    if(d.length===0){
      root.innerHTML = '<div class="done"><h2>เก่งมาก! 🎉</h2><p>คุณจำคำศัพท์'+(revCat==="all"?"":"ในหมวดนี้")+'ได้ครบทุกคำแล้ว</p></div>'+catPills(revCat,"rev-cat"); return;
    }
    if(revIdx >= d.length) revIdx = 0;
    var card = d[revIdx];
    var face = !revFlip
      ? '<p class="lbl">คำศัพท์</p><p class="big">'+esc(card.word)+'</p>'+(card.pos?'<p style="font-style:italic;color:var(--muted2);margin:8px 0 0">'+esc(card.pos)+'</p>':'')+'<p class="hint">แตะเพื่อดูความหมาย</p>'
      : '<p class="lbl m">ความหมาย</p><p class="mean-big">'+esc(card.meaning||"—")+'</p>'+(card.example?'<p class="ex" style="margin-top:16px">'+esc(card.example)+'</p>':'')+'<p class="serif" style="margin-top:8px;color:var(--muted2);font-size:14px">'+esc(card.word)+'</p>';

    root.innerHTML =
      '<div class="rev-top"><span>เหลือทบทวน '+d.length+' คำ</span><span>'+(revIdx+1)+' / '+d.length+'</span></div>'+
      '<div class="flash" data-action="flip">'+face+'</div>'+
      '<div class="rev-btns">'+
        '<button class="btn btn-forgot" data-action="forgot">ยังไม่จำ</button>'+
        '<button class="btn btn-known" data-action="known">จำได้ ✓</button>'+
      '</div>'+
      '<p class="rev-note">“จำได้” จะเลื่อนคำขึ้นทีละขั้น: ใหม่ → กำลังจำ → จำได้แล้ว</p>'+
      catPills(revCat,"rev-cat");
  }

  function reviewNext(status){
    var d = deck();
    if(revIdx >= d.length) revIdx = 0;
    var card = d[revIdx];
    if(!card) return;
    var i = words.findIndex(function(w){ return w.id===card.id; });
    if(i>=0){ words[i].status = status; words[i].updatedAt = Date.now(); cloudUpsert(words[i]); }
    revFlip = false;
    var d2 = deck();
    if(d2.length===0){ revIdx=0; save(); return; }
    var still = d2.findIndex(function(w){ return w.id===card.id; });
    revIdx = (still>=0) ? (still+1)%d2.length : revIdx%d2.length;
    save();
  }

  /* ---------- STATS ---------- */
  function renderStats(){
    var c = counts(), total = words.length;
    function pct(n){ return total? Math.round(n/total*100):0; }
    var rows = [
      ["mastered",c.mastered],["learning",c.learning],["new",c.new]
    ];
    root.innerHTML =
      '<div class="card stat-hero">'+
        '<div style="color:var(--muted);font-size:14px">คำศัพท์ทั้งหมด</div>'+
        '<div class="big">'+total+'</div>'+
        '<div class="sub2">จำได้แล้ว '+c.mastered+' คำ ('+pct(c.mastered)+'%)</div>'+
      '</div>'+
      '<div class="card" style="margin-top:16px">'+
        rows.map(function(r){
          var s = STATUS[r[0]];
          return '<div class="bar-row">'+
            '<div class="bar-top"><span class="l"><span class="dot" style="background:'+s.bar+'"></span>'+s.label+'</span>'+
            '<span style="color:var(--muted)">'+r[1]+' คำ · '+pct(r[1])+'%</span></div>'+
            '<div class="bar"><span style="width:'+pct(r[1])+'%;background:'+s.bar+'"></span></div></div>';
        }).join("")+
      '</div>'+
      (total?'<button class="btn btn-ghost" data-action="export">ส่งออก CSV</button>':'');
  }

  /* ---------- export ---------- */
  function exportCsv(){
    var head = ["word","pos","meaning","example","status"];
    function q(v){ return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'; }
    var lines = [head.join(",")].concat(words.map(function(w){
      return [w.word,w.pos,w.meaning,w.example,w.status].map(q).join(",");
    }));
    var csv = "\uFEFF"+lines.join("\n");
    try{
      var blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "vocabulary.csv";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){ alert("ส่งออกไม่สำเร็จบนเบราว์เซอร์นี้"); }
  }

  /* ---------- LISTEN (text-to-speech) ---------- */
  var synth = window.speechSynthesis || null;
  var voices = [];
  function loadVoices(){ if(synth){ try{ voices = synth.getVoices()||[]; }catch(e){ voices=[]; } } }
  loadVoices();
  if(synth && "onvoiceschanged" in synth){ synth.onvoiceschanged = loadVoices; }

  var lsPlaying=false, lsToken=0, lsIdx=0, lsSet="all", lsRate=0.9, lsThai=true;

  function lsDeck(){ return words.filter(function(w){ return (lsSet==="all" || w.status===lsSet) && catMatch(w, lsCat); }); }
  function wait(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
  function pickVoice(pfx){ for(var i=0;i<voices.length;i++){ var L=(voices[i].lang||"").toLowerCase(); if(L.indexOf(pfx)===0) return voices[i]; } return null; }

  function speakOne(text, lang, rate){
    return new Promise(function(resolve){
      if(!synth || !text){ resolve(); return; }
      var u = new SpeechSynthesisUtterance(String(text));
      u.lang = (lang==="th") ? "th-TH" : "en-US";
      var v = pickVoice(lang==="th"?"th":"en"); if(v) u.voice=v;
      u.rate = rate||1; u.pitch = 1;
      u.onend = function(){ resolve(); };
      u.onerror = function(){ resolve(); };
      try{ synth.speak(u); }catch(e){ resolve(); }
    });
  }

  function stopSpeak(){ lsPlaying=false; lsToken++; if(synth){ try{ synth.cancel(); }catch(e){} } updateListenUI(); }

  function speakWord(id){
    if(!synth) return;
    var w = words.find(function(x){ return x.id===id; }); if(!w) return;
    try{ synth.cancel(); }catch(e){}
    speakOne(w.word,"en",lsRate).then(function(){ if(lsThai && w.meaning) return speakOne(w.meaning,"th",lsRate); });
  }

  async function lsPlay(){
    if(!synth) return;
    var my = ++lsToken; lsPlaying=true; updateListenUI();
    var deck = lsDeck();
    if(deck.length===0){ lsPlaying=false; updateListenUI(); return; }
    while(lsPlaying && my===lsToken){
      if(lsIdx>=deck.length) lsIdx=0;
      var w = deck[lsIdx];
      updateListenUI(w);
      await speakOne(w.word,"en",lsRate);              if(!lsPlaying||my!==lsToken) break;
      await wait(550);                                 if(!lsPlaying||my!==lsToken) break;
      await speakOne(w.word,"en",lsRate);              if(!lsPlaying||my!==lsToken) break;
      await wait(450);                                 if(!lsPlaying||my!==lsToken) break;
      if(lsThai && w.meaning){
        await speakOne(w.meaning,"th",lsRate);         if(!lsPlaying||my!==lsToken) break;
        await wait(500);                               if(!lsPlaying||my!==lsToken) break;
      }
      lsIdx = (lsIdx+1) % deck.length;
    }
  }

  function lsToggle(){ if(lsPlaying){ stopSpeak(); } else { lsPlay(); } }
  function lsStep(d){
    var deck = lsDeck(); if(!deck.length) return;
    lsIdx = (lsIdx + d + deck.length) % deck.length;
    if(lsPlaying){ stopSpeak(); lsPlaying=true; lsPlay(); } else { updateListenUI(deck[lsIdx]); }
  }

  function updateListenUI(word){
    if(view!=="listen") return;
    var deck = lsDeck();
    var cur = word || deck[lsIdx] || words[0] || null;
    var nw=document.getElementById("lsWord"), nm=document.getElementById("lsMean"), pb=document.getElementById("lsPlay"), pos=document.getElementById("lsPos");
    if(nw) nw.textContent = cur ? cur.word : "—";
    if(nm) nm.textContent = cur ? (cur.meaning||"") : "";
    if(pos) pos.textContent = (cur && cur.pos) ? cur.pos : "";
    if(pb) pb.textContent = lsPlaying ? "⏸" : "▶";
  }

  function renderListen(){
    if(!synth){
      root.innerHTML = '<div class="empty">ขออภัย เบราว์เซอร์นี้ไม่รองรับการอ่านออกเสียง ลองเปิดด้วย Chrome หรือ Safari รุ่นใหม่</div>'; return;
    }
    if(words.length===0){
      root.innerHTML = '<div class="empty">เพิ่มคำศัพท์ก่อน แล้วค่อยมาเปิดฟังนะครับ</div>'; return;
    }
    var deck = lsDeck(); if(lsIdx>=deck.length) lsIdx=0;
    var cur = deck[lsIdx] || words[0];
    function setBtn(id,label){ return '<button class="pill'+(lsSet===id?" on":"")+'" data-action="ls-set" data-s="'+id+'">'+label+'</button>'; }
    function spdBtn(v,label){ return '<button class="pill'+(lsRate===v?" on":"")+'" data-action="ls-speed" data-r="'+v+'">'+label+'</button>'; }
    root.innerHTML =
      '<div class="player">'+
        '<div class="pl-label">กำลังอ่าน</div>'+
        '<div id="lsWord" class="pl-word">'+esc(cur?cur.word:"—")+'</div>'+
        '<div id="lsPos" class="pl-pos">'+esc(cur&&cur.pos?cur.pos:"")+'</div>'+
        '<div id="lsMean" class="pl-mean">'+esc(cur?(cur.meaning||""):"")+'</div>'+
        '<div class="pl-controls">'+
          '<button class="pl-side" data-action="ls-prev">⏮</button>'+
          '<button class="pl-main" id="lsPlay" data-action="ls-toggle">'+(lsPlaying?"⏸":"▶")+'</button>'+
          '<button class="pl-side" data-action="ls-next">⏭</button>'+
        '</div>'+
      '</div>'+
      '<div class="pl-set"><div class="pl-row-label">อ่านชุดไหน</div><div class="pills">'+
        setBtn("all","ทั้งหมด")+setBtn("learning","กำลังจำ")+setBtn("new","ใหม่")+'</div></div>'+
      catPills(lsCat,"ls-cat")+
      '<div class="pl-set"><div class="pl-row-label">ความเร็ว</div><div class="pills">'+
        spdBtn(0.7,"ช้า")+spdBtn(0.9,"ปกติ")+spdBtn(1.1,"เร็ว")+'</div></div>'+
      '<div class="pl-set"><div class="pills"><button class="pill'+(lsThai?" on":"")+'" data-action="ls-thai">'+(lsThai?"✓ ":"")+'อ่านคำแปลไทยด้วย</button></div></div>'+
      '<p class="rev-note">เคล็ดลับขับรถ: ตั้งมือถือบนแท่น เปิดจอค้างไว้ กดเล่นแล้วฟังได้เลย · ระบบจะวนอ่านไปเรื่อยๆ จนกด ⏸</p>';
  }

  /* ---------- TYPE PRACTICE ---------- */
  var tpSet="learning", tpDeck=[], tpIdx=0, tpPrev="", tpStart=0,
      tpKeys=0, tpErr=0, tpChars=0, tpDone=false, tpWrong=[], tpCurWrong=false, tpSpeak=false, tpThai=true,
      tpTimeLimit=0, tpEndsAt=0, tpTimer=null, tpWordsDone=0, tpFinalWpm=0;

  /* จำเวลาที่แต่ละคำถูกฝึกพิมพ์ล่าสุด เพื่อวนให้ครบทุกคำก่อนเริ่มซ้ำ */
  var TKEY = "vocab-typed-v1";
  var typedAt = {};
  try{ typedAt = JSON.parse(localStorage.getItem(TKEY)) || {}; }catch(e){ typedAt = {}; }
  function tpMark(id){ typedAt[id] = Date.now(); try{ localStorage.setItem(TKEY, JSON.stringify(typedAt)); }catch(e){} }

  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function tpFilter(){ return words.filter(function(w){ return (tpSet==="all" || w.status===tpSet) && catMatch(w, tpCat); }); }
  function tpBuildDeck(){
    var arr = shuffle(tpFilter());
    arr.sort(function(a,b){ return (typedAt[a.id]||0) - (typedAt[b.id]||0); });
    return arr;
  }
  function tpInit(){ tpStopTimer(); tpDeck=tpBuildDeck(); tpIdx=0; tpPrev=""; tpStart=0; tpKeys=0; tpErr=0; tpChars=0; tpDone=false; tpWrong=[]; tpCurWrong=false; tpEndsAt=0; tpWordsDone=0; tpFinalWpm=0; }

  function tpSay(c){
    if(!tpSpeak || !synth || !c) return;
    try{ synth.cancel(); }catch(e){}
    speakOne(c.word,"en",1).then(function(){ if(tpThai && c.meaning) return speakOne(c.meaning,"th",1); });
  }
  function tpWpm(){ if(!tpStart) return 0; var m=(Date.now()-tpStart)/60000; return m>0 ? Math.round((tpChars/5)/m) : 0; }
  function tpAcc(){ return tpKeys ? Math.round((tpKeys-tpErr)/tpKeys*100) : 100; }
  function tpMarkWrong(){ if(!tpCurWrong){ tpCurWrong=true; tpWrong.push(tpDeck[tpIdx]); } }

  function tpStopTimer(){ if(tpTimer){ clearInterval(tpTimer); tpTimer=null; } }

  function tpBegin(){
    if(tpStart) return;
    tpStart = Date.now();
    if(tpTimeLimit > 0){
      tpEndsAt = tpStart + tpTimeLimit*1000;
      tpTimer = setInterval(tpTick, 250);
    }
  }

  function tpTick(){
    if(view!=="type" || tpDone){ tpStopTimer(); return; }
    var left = Math.max(0, Math.ceil((tpEndsAt - Date.now())/1000));
    var el = document.getElementById("tpTime");
    if(el) el.textContent = left;
    if(left <= 0){
      tpStopTimer();
      tpFinalWpm = tpWpm();
      tpDone = true;
      renderType();
    }
  }

  function tpFinish(){
    tpStopTimer();
    tpFinalWpm = tpWpm();
    tpDone = true;
    renderType();
  }

  function tpNext(inp){
    tpIdx++; tpPrev=""; tpCurWrong=false; if(inp) inp.value="";
    if(tpIdx>=tpDeck.length){
      if(tpTimeLimit>0 && tpStart){ tpDeck=tpBuildDeck(); tpIdx=0; }
      else { tpFinish(); return; }
    }
    tpPaint();
    tpSay(tpDeck[tpIdx]);
  }

  function tpType(inp){
    if(tpDone || !tpDeck.length) return;
    var w=tpDeck[tpIdx].word, val=inp.value;
    if(val) tpBegin();
    if(val.length>tpPrev.length){
      for(var i=tpPrev.length;i<val.length;i++){
        tpKeys++;
        if(i>=w.length || val.charAt(i).toLowerCase()!==w.charAt(i).toLowerCase()){ tpErr++; tpMarkWrong(); }
      }
    }
    tpPrev=val;
    if(val.toLowerCase()===w.toLowerCase()){ tpChars+=w.length+1; tpWordsDone++; tpMark(tpDeck[tpIdx].id); tpNext(inp); }
    else tpPaint();
  }

  function tpPaint(){
    if(view!=="type" || tpDone || !tpDeck.length) return;
    var c=tpDeck[tpIdx], w=c.word;
    var inp=document.getElementById("tpInput");
    var val=inp ? inp.value : "";
    var mean=document.getElementById("tpMean"), pos=document.getElementById("tpPos"),
        box=document.getElementById("tpWordBox"), st=document.getElementById("tpStats");
    if(mean) mean.textContent = c.meaning || "—";
    if(pos) pos.textContent = c.pos || "";
    var html="", i, ch, cls;
    for(i=0;i<w.length;i++){
      ch = w.charAt(i)===" " ? " " : esc(w.charAt(i));
      cls = i<val.length ? (val.charAt(i).toLowerCase()===w.charAt(i).toLowerCase()?"ok":"bad") : (i===val.length?"cur":"");
      html += cls ? '<span class="'+cls+'">'+ch+'</span>' : '<span>'+ch+'</span>';
    }
    for(i=w.length;i<val.length;i++){ html += '<span class="bad">'+(val.charAt(i)===" "?" ":esc(val.charAt(i)))+'</span>'; }
    if(box) box.innerHTML=html;
    var prog = (tpTimeLimit>0)
      ? '<span>พิมพ์แล้ว <b>'+tpWordsDone+'</b> คำ</span><span>เหลือ <b id="tpTime">'+(tpStart ? Math.max(0,Math.ceil((tpEndsAt-Date.now())/1000)) : tpTimeLimit)+'</b> วิ</span>'
      : '<span>คำที่ <b>'+(tpIdx+1)+'/'+tpDeck.length+'</b></span>';
    if(st) st.innerHTML = prog+'<span>ความเร็ว <b>'+tpWpm()+'</b> WPM</span><span>แม่นยำ <b>'+tpAcc()+'%</b></span>';
  }

  function renderType(){
    if(words.length===0){
      root.innerHTML = '<div class="empty">เพิ่มคำศัพท์ก่อน แล้วค่อยมาฝึกพิมพ์นะครับ</div>'; return;
    }
    function setBtn(id,label){ return '<button class="pill'+(tpSet===id?" on":"")+'" data-action="tp-set" data-s="'+id+'">'+label+'</button>'; }
    function timeBtn(v,label){ return '<button class="pill'+(tpTimeLimit===v?" on":"")+'" data-action="tp-time" data-t="'+v+'">'+label+'</button>'; }
    var picker =
      '<div class="pl-set"><div class="pl-row-label">ฝึกชุดไหน</div><div class="pills">'+
        setBtn("learning","กำลังจำ")+setBtn("new","ใหม่")+setBtn("all","ทั้งหมด")+'</div></div>'+
      catPills(tpCat,"tp-cat")+
      '<div class="pl-set"><div class="pl-row-label">จับเวลา</div><div class="pills">'+
        timeBtn(0,"ไม่จับเวลา")+timeBtn(30,"30 วิ")+timeBtn(60,"1 นาที")+timeBtn(120,"2 นาที")+'</div></div>'+
      '<div class="pl-set"><div class="pills">'+
        '<button class="pill'+(tpSpeak?" on":"")+'" data-action="tp-speak">'+(tpSpeak?"✓ ":"")+'อ่านออกเสียงเมื่อขึ้นคำใหม่</button>'+
        (tpSpeak ? '<button class="pill'+(tpThai?" on":"")+'" data-action="tp-thai">'+(tpThai?"✓ ":"")+'อ่านคำแปลไทยด้วย</button>' : '')+
      '</div></div>';

    if(tpDone){
      var wrongHtml = tpWrong.length
        ? '<div class="card" style="margin-top:16px"><div style="font-weight:700;color:var(--ink);font-size:14px;margin-bottom:8px">คำที่พิมพ์ผิดหรือข้าม ('+tpWrong.length+' คำ)</div>'+
          tpWrong.map(function(w){ return '<div style="font-size:14px;margin-top:6px"><span class="serif" style="color:var(--ink);font-weight:600">'+esc(w.word)+'</span> <span style="color:var(--muted)">— '+esc(w.meaning||"")+'</span></div>'; }).join("")+'</div>'
        : '<div class="done" style="margin-top:16px;padding:24px 16px"><h2 style="font-size:18px">พิมพ์ถูกทุกคำ! 🎉</h2><p>ไม่มีคำที่พิมพ์ผิดเลย</p></div>';
      root.innerHTML =
        '<div class="card stat-hero">'+
          '<div style="color:var(--muted);font-size:14px">ผลการฝึกพิมพ์ · '+(tpTimeLimit>0 ? "จับเวลา "+tpTimeLimit+" วินาที" : "ครบชุด "+tpDeck.length+" คำ")+'</div>'+
          '<div class="big">'+tpFinalWpm+'</div>'+
          '<div style="color:var(--muted);font-size:14px">WPM</div>'+
          '<div class="sub2">ความแม่นยำ '+tpAcc()+'% · พิมพ์ถูก '+tpWordsDone+' คำ</div>'+
        '</div>'+wrongHtml+
        '<button class="btn btn-primary" data-action="tp-again">ฝึกอีกครั้ง</button>'+picker;
      return;
    }
    if(!tpDeck.length){
      root.innerHTML = '<div class="empty">ไม่มีคำศัพท์ในชุดนี้ ลองเลือกชุดอื่นดูครับ</div>'+picker;
      return;
    }
    root.innerHTML =
      '<div class="player" data-action="tp-focus">'+
        '<div class="pl-label">ความหมาย</div>'+
        '<div class="tp-mean" id="tpMean"></div>'+
        '<div class="pl-pos" id="tpPos"></div>'+
        '<div class="tp-word" id="tpWordBox"></div>'+
        '<input id="tpInput" class="tp-input" placeholder="พิมพ์คำศัพท์ที่นี่…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />'+
        '<div class="tp-stats" id="tpStats"></div>'+
      '</div>'+picker+
      '<p class="rev-note">พิมพ์ให้ถูกทั้งคำ ระบบจะขึ้นคำถัดไปให้เอง · กด Enter เพื่อข้ามคำที่นึกไม่ออก</p>';
    tpPaint();
    var inp=document.getElementById("tpInput"); if(inp) inp.focus();
  }

  /* ---------- events ---------- */
  document.addEventListener("click", function(e){
    var t = e.target.closest("[data-action]");
    if(!t) return;
    var a = t.getAttribute("data-action");

    if(a==="tab"){
      stopSpeak();
      tpStopTimer();
      view = t.getAttribute("data-v");
      filter="all"; revIdx=0; revFlip=false; confirmId=null;
      if(view==="type") tpInit();
      Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){ b.classList.toggle("active", b.getAttribute("data-v")===view); });
      render();
    }
    else if(a==="add"){
      var w = document.getElementById("w").value.trim();
      if(!w) return;
      var nw = { id:uid(), word:w,
        meaning:document.getElementById("m").value.trim(),
        pos:document.getElementById("pos").value,
        example:document.getElementById("ex").value.trim(),
        cat:document.getElementById("cat").value.trim(),
        status:"new", createdAt:Date.now(), updatedAt:Date.now() };
      words.unshift(nw);
      cloudUpsert(nw);
      save();
    }
    else if(a==="filter"){ filter = t.getAttribute("data-f"); listLimit=100; renderListArea(); }
    else if(a==="cat-filter"){ catFilter = t.getAttribute("data-c"); listLimit=100; renderListArea(); }
    else if(a==="sort"){ sortBy = t.getAttribute("data-s"); listLimit=100; renderListArea(); }
    else if(a==="more"){ listLimit += 200; renderListArea(); }
    else if(a==="rev-cat"){ revCat = t.getAttribute("data-c"); revIdx=0; revFlip=false; renderReview(); }
    else if(a==="tp-cat"){ tpCat = t.getAttribute("data-c"); tpInit(); renderType(); }
    else if(a==="ls-cat"){
      lsCat = t.getAttribute("data-c"); lsIdx=0;
      var wasP2 = lsPlaying; stopSpeak();
      renderListen();
      if(wasP2){ lsPlaying=true; lsPlay(); }
    }
    else if(a==="cycle"){
      var id=t.getAttribute("data-id"), i=words.findIndex(function(x){return x.id===id;});
      if(i>=0){ words[i].status = ORDER[(ORDER.indexOf(words[i].status)+1)%3]; words[i].updatedAt = Date.now(); cloudUpsert(words[i]); save(); }
    }
    else if(a==="quick-done"){
      var qid=t.getAttribute("data-id"), qi=words.findIndex(function(x){return x.id===qid;});
      if(qi>=0){ words[qi].status="mastered"; words[qi].updatedAt=Date.now(); cloudUpsert(words[qi]); save(); }
    }
    else if(a==="del-ask"){ confirmId=t.getAttribute("data-id"); renderListArea(); }
    else if(a==="del-no"){ confirmId=null; renderListArea(); }
    else if(a==="del-yes"){
      var did=t.getAttribute("data-id"); words=words.filter(function(x){return x.id!==did;}); confirmId=null; cloudDelete(did); save();
    }
    else if(a==="flip"){ revFlip=!revFlip; renderReview(); }
    else if(a==="known"){
      var dk=deck(), card=dk[revIdx];
      if(card){ var ni=Math.min(ORDER.indexOf(card.status)+1,2); reviewNext(ORDER[ni]); }
    }
    else if(a==="forgot"){ reviewNext("learning"); }
    else if(a==="speak"){ speakWord(t.getAttribute("data-id")); }
    else if(a==="ls-toggle"){ lsToggle(); }
    else if(a==="ls-next"){ lsStep(1); }
    else if(a==="ls-prev"){ lsStep(-1); }
    else if(a==="ls-set"){
      lsSet=t.getAttribute("data-s"); lsIdx=0;
      var wasP=lsPlaying; stopSpeak();
      renderListen();
      if(wasP){ lsPlaying=true; lsPlay(); }
    }
    else if(a==="ls-speed"){ lsRate=parseFloat(t.getAttribute("data-r")); renderListen(); }
    else if(a==="ls-thai"){ lsThai=!lsThai; renderListen(); }
    else if(a==="tp-set"){ tpSet=t.getAttribute("data-s"); tpInit(); renderType(); }
    else if(a==="tp-time"){ tpTimeLimit=parseInt(t.getAttribute("data-t"),10)||0; tpInit(); renderType(); }
    else if(a==="tp-speak"){ tpSpeak=!tpSpeak; renderType(); }
    else if(a==="tp-thai"){ tpThai=!tpThai; renderType(); }
    else if(a==="tp-again"){ tpInit(); renderType(); }
    else if(a==="tp-focus"){ var ti=document.getElementById("tpInput"); if(ti) ti.focus(); }
    else if(a==="bulk-toggle"){ bulkOpen=!bulkOpen; bulkMsg=""; renderList(); }
    else if(a==="bulk-add"){ bulkAdd(); }
    else if(a==="cloud-in"){ if(window.VocabCloud) window.VocabCloud.signIn(); }
    else if(a==="cloud-out"){ if(window.VocabCloud) window.VocabCloud.signOut(); }
    else if(a==="export"){ exportCsv(); }
    else if(a==="install"){
      alert("วิธีเพิ่มเป็นแอปบนมือถือ:\n\nAndroid (Chrome): แตะเมนู ⋮ ขวาบน → “เพิ่มลงในหน้าจอหลัก” (Add to Home screen)\n\niPhone (Safari): แตะปุ่มแชร์ ⬆️ → เลื่อนหา “เพิ่มลงในหน้าจอโฮม”\n\nจะได้ไอคอนแอป เปิดเต็มจอ และใช้งานออฟไลน์ได้");
    }
  });

  document.addEventListener("input", function(e){
    if(!e.target) return;
    if(e.target.id==="search"){ query = e.target.value; listLimit=100; renderListArea(); }
    else if(e.target.id==="tpInput"){ tpType(e.target); }
  });

  document.addEventListener("keydown", function(e){
    if(e.target && e.target.id==="tpInput" && e.key==="Enter"){
      e.preventDefault();
      if(tpDone || !tpDeck.length) return;
      tpBegin();
      tpMarkWrong();
      tpMark(tpDeck[tpIdx].id);
      tpNext(e.target);
    }
  });

  /* ---------- bulk add ---------- */
  function parseBulkLine(line){
    var parts;
    if(line.indexOf("\t")>=0) parts=line.split("\t");
    else if(line.indexOf("=")>=0) parts=line.split("=");
    else if(line.indexOf(",")>=0) parts=line.split(",");
    else if(line.indexOf(" - ")>=0) parts=line.split(" - ");
    else parts=[line];
    var w=(parts[0]||"").trim();
    if(!w) return null;
    return { word:w, meaning:(parts[1]||"").trim(), pos:(parts[2]||"").trim() };
  }

  function bulkAdd(){
    var ta = document.getElementById("bulk");
    if(!ta) return;
    var lines = ta.value.split(/\r?\n/);
    var have = {};
    words.forEach(function(x){ have[x.word.toLowerCase().trim()]=1; });
    var added=0, skipped=0, base=Date.now();
    lines.forEach(function(line){
      var r = parseBulkLine(line.trim());
      if(!r) return;
      var key = r.word.toLowerCase();
      if(have[key]){ skipped++; return; }
      have[key]=1;
      var bc = document.getElementById("bulkCat") ? document.getElementById("bulkCat").value.trim() : "";
      var nw = { id:uid(), word:r.word, meaning:r.meaning, pos:r.pos, example:"", cat:bc,
        status:"new", createdAt:base-added, updatedAt:Date.now() };
      words.push(nw);
      cloudUpsert(nw);
      added++;
    });
    var keep = added ? "" : ta.value;
    bulkMsg = added
      ? ("✓ เพิ่มแล้ว "+added+" คำ"+(skipped ? " · ข้ามคำซ้ำ "+skipped+" คำ" : ""))
      : (skipped ? "คำทั้งหมดมีอยู่แล้ว ("+skipped+" คำ)" : "ไม่พบคำศัพท์ในข้อความที่วาง");
    if(added){ save(); } else { renderList(); }
    bulkMsg = "";
    var ta2 = document.getElementById("bulk");
    if(ta2 && keep) ta2.value = keep;
  }

  /* ---------- cloud sync bridge (Firebase) ---------- */
  var cloudUser = null;

  function cloudUpsert(w){ if(cloudUser && window.VocabCloud) window.VocabCloud.saveWord(w); }
  function cloudDelete(id){ if(cloudUser && window.VocabCloud) window.VocabCloud.deleteWord(id); }

  function renderSyncBar(state, detail){
    var bar = document.getElementById("syncBar");
    if(!bar) return;
    if(state==="hidden"){ bar.style.display="none"; return; }
    bar.style.display="flex";
    if(state==="signedout") bar.innerHTML = '<span>☁️ ซิงก์คำศัพท์ข้ามเครื่องด้วยบัญชี Google</span><button data-action="cloud-in">เข้าสู่ระบบ</button>';
    else if(state==="signedin") bar.innerHTML = '<span>☁️ ซิงก์แล้ว · '+esc(detail||"")+'</span><button class="out" data-action="cloud-out">ออกจากระบบ</button>';
    else if(state==="connecting") bar.innerHTML = '<span>กำลังเชื่อมต่อ…</span>';
    else if(state==="file") bar.innerHTML = '<span>💡 เปิดผ่านลิงก์เว็บเพื่อใช้ซิงก์ข้ามเครื่อง</span>';
    else if(state==="error") bar.innerHTML = '<span>⚠️ '+esc(detail||"เชื่อมต่อไม่สำเร็จ")+'</span><button data-action="cloud-in">ลองใหม่</button>';
  }

  window.VocabApp = {
    getWords: function(){ return words.slice(); },
    setWords: function(arr){
      words = arr;
      try{ localStorage.setItem(KEY, JSON.stringify(words)); }catch(e){}
      renderCount();
      if(view==="list" || view==="stats") render();
    },
    setAuth: function(user){
      cloudUser = user;
      renderSyncBar(user ? "signedin" : "signedout", user ? (user.email||"") : null);
    },
    setSyncState: renderSyncBar
  };

  /* ---------- PWA bits (icon + manifest, injected at runtime) ---------- */
  (function(){
    var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'><rect width='512' height='512' rx='112' fill='#312e81'/><text x='256' y='300' font-family='Georgia,serif' font-size='300' font-weight='700' fill='#fde68a' text-anchor='middle'>A</text></svg>";
    var iconUri = "data:image/svg+xml," + encodeURIComponent(svg);
    [["icon"],["apple-touch-icon"]].forEach(function(r){
      var l=document.createElement("link"); l.rel=r[0]; l.href=iconUri; document.head.appendChild(l);
    });
    try{
      var manifest = { name:"สมุดคำศัพท์", short_name:"คำศัพท์", start_url:".", scope:".",
        display:"standalone", background_color:"#fafaf7", theme_color:"#312e81",
        icons:[{src:iconUri, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"}] };
      var mb = new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
      var ml = document.createElement("link"); ml.rel="manifest"; ml.href=URL.createObjectURL(mb);
      document.head.appendChild(ml);
    }catch(e){}
  })();

  renderCount();
  render();
})();
</script>

<script type="module">
/* ---------- Firebase Cloud Sync ----------
   เปิดใช้งานโดยวางค่า firebaseConfig จาก Firebase Console แทน null ด้านล่างนี้
   (Project settings → General → Your apps → SDK setup and configuration) */
var firebaseConfig = {
  apiKey: "AIzaSyB0_i7A_IIdzd-9vyC9a6iM8D28bccOOUA",
  authDomain: "vocab-app-662e7.firebaseapp.com",
  projectId: "vocab-app-662e7",
  storageBucket: "vocab-app-662e7.firebasestorage.app",
  messagingSenderId: "891724867058",
  appId: "1:891724867058:web:ea2060a832cf3e49d8b76b",
  measurementId: "G-XTKCC7T7M6"
};

const V = window.VocabApp;
if (firebaseConfig && location.protocol === "file:") {
  V.setSyncState("file");
} else if (firebaseConfig) {
  try {
    const SDK = "https://www.gstatic.com/firebasejs/10.12.2/";
    const { initializeApp } = await import(SDK + "firebase-app.js");
    const { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } = await import(SDK + "firebase-auth.js");
    const { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch } = await import(SDK + "firebase-firestore.js");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let db;
    try { db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) }); }
    catch (e) { db = getFirestore(app); }

    function clean(w){
      return { id:String(w.id), word:String(w.word||""), meaning:String(w.meaning||""), pos:String(w.pos||""),
        example:String(w.example||""), cat:String(w.cat||""), status:String(w.status||"new"),
        createdAt:Number(w.createdAt)||Date.now(), updatedAt:Number(w.updatedAt||w.createdAt)||Date.now() };
    }

    window.VocabCloud = {
      saveWord: function(w){
        if(!auth.currentUser) return;
        var c = clean(w);
        setDoc(doc(db, "users", auth.currentUser.uid, "words", c.id), c).catch(function(e){ console.error(e); });
      },
      deleteWord: function(id){
        if(!auth.currentUser) return;
        deleteDoc(doc(db, "users", auth.currentUser.uid, "words", String(id))).catch(function(e){ console.error(e); });
      },
      signIn: async function(){
        V.setSyncState("connecting");
        var provider = new GoogleAuthProvider();
        try { await signInWithPopup(auth, provider); }
        catch (e) {
          if (e && e.code === "auth/popup-blocked") {
            try { await signInWithRedirect(auth, provider); return; } catch (e2) { e = e2; }
          }
          if (e && (e.code === "auth/popup-closed-by-user" || e.code === "auth/cancelled-popup-request")) {
            V.setAuth(auth.currentUser ? { email: auth.currentUser.email } : null);
            return;
          }
          V.setSyncState("error", (e && e.message) || String(e));
        }
      },
      signOut: function(){ signOut(auth); }
    };

    getRedirectResult(auth).catch(function(){});

    var unsub = null, merged = false;
    onAuthStateChanged(auth, function(user){
      if (unsub) { unsub(); unsub = null; }
      merged = false;
      V.setAuth(user ? { email: user.email } : null);
      if (!user) return;
      var col = collection(db, "users", user.uid, "words");
      unsub = onSnapshot(col, function(snap){
        var cloudWords = snap.docs.map(function(d){ return d.data(); });
        if (!merged) {
          merged = true;
          /* รอบแรกหลังล็อกอิน: อัปโหลดคำในเครื่องที่ยังไม่มีบนคลาวด์ (กันซ้ำด้วยตัวคำ) */
          var byId = {}, byText = {};
          cloudWords.forEach(function(w){ byId[w.id] = w; byText[(w.word||"").toLowerCase().trim()] = true; });
          var locals = V.getWords().filter(function(w){
            var c = byId[w.id];
            if (c) return (w.updatedAt||w.createdAt||0) > (c.updatedAt||c.createdAt||0);
            return !byText[(w.word||"").toLowerCase().trim()];
          });
          if (locals.length) {
            for (var i = 0; i < locals.length; i += 400) {
              var batch = writeBatch(db);
              locals.slice(i, i+400).forEach(function(w){ var c = clean(w); batch.set(doc(col, c.id), c); });
              batch.commit().catch(function(e){ console.error(e); });
            }
            return; /* snapshot จะยิงซ้ำเองพร้อมข้อมูลที่รวมแล้ว */
          }
        }
        cloudWords.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
        V.setWords(cloudWords);
      }, function(err){ V.setSyncState("error", err.message || String(err)); });
    });
  } catch (e) {
    console.error(e);
    V.setSyncState("error", "โหลด Firebase ไม่สำเร็จ ลองรีเฟรชหน้า");
  }
}
</script>
